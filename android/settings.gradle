pluginManagement {
    includeBuild("../node_modules/@react-native/gradle-plugin")
    repositories {
        google()
        mavenCentral()
    }
    resolutionStrategy {
        eachPlugin {
            if (requested.id.id == "com.facebook.react") {
                useModule("com.facebook.react:react-gradle-plugin:${requested.version}")
            }
        }
    }
}
